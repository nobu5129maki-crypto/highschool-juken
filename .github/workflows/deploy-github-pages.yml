# リポジトリ Settings → Pages → Build and deployment → Source を「GitHub Actions」に設定。
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # package-lock.json が無いと npm ci は失敗する。ログのどのステップが赤いかで原因が分かる。
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::package-lock.json がありません。npm install で続行します。"
            npm install
          fi

      - name: TypeScript check (tsc)
        run: npx tsc -b

      - name: Vite build
        run: npx vite build

      - name: Post-build (SPA 404 fallback)
        run: node scripts/postbuild-spa-fallback.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
